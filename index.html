<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فرحه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --parchment: #e8dfc8;
    --gold: #7b4fa6;
    --gold-light: #b07fd4;
    --smoke: #8a8070;
    --deep: #05080d;
    --cold: #0a111a;
    --slate: #2a3545;
    --silver: #9eaab8;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--deep);
    color: var(--parchment);
    font-family: 'Tajawal', sans-serif;
    }
  
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    opacity:0.4; pointer-events:none; z-index:9998;
  }

  #splash {
    position:fixed; inset:0; z-index:2000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 40%, #0c1520 0%, #05080d 70%);
    transition: opacity 1.4s ease, visibility 1.4s ease;
  }
  #splash.hidden { opacity:0; visibility:hidden; pointer-events:none; display:none !important; }

  .splash-photo-wrap {
    position: relative;
    width: min(480px, 92vw);
    margin-bottom: 2rem;
    animation: riseIn 1.4s ease 0.1s both;
  }
  .splash-photo {
    width: 100%;
    height: 200px;
    object-fit: cover;
    object-position: center 30%;
    display: block;
    filter: grayscale(30%) brightness(0.75) contrast(1.1);
    border: 1px solid rgba(154,122,56,0.2);
  }
  .splash-photo-wrap::before {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(
      to bottom,
      rgba(5,8,13,0.55) 0%,
      rgba(5,8,13,0.0) 35%,
      rgba(5,8,13,0.0) 65%,
      rgba(5,8,13,0.7) 100%
    );
    z-index:1;
    pointer-events:none;
  }
  .splash-photo-wrap::after {
    content:'';
    position:absolute; inset:0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(5,8,13,0.65) 100%);
    z-index:1;
    pointer-events:none;
  }

  .splash-rain {
    position:absolute; inset:0; overflow:hidden; pointer-events:none;
  }
  .splash-drop {
    position:absolute;
    width:1px;
    background: linear-gradient(to bottom, transparent, rgba(100,150,200,0.3), transparent);
    animation: fall var(--d) linear var(--dl) infinite;
  }
  @keyframes fall {
    from { transform: translateY(-100px); opacity:0; }
    10%  { opacity:1; }
    90%  { opacity:0.5; }
    to   { transform: translateY(110vh); opacity:0; }
  }

  .splash-line {
    width:100px; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin:20px auto;
    animation: glow-line 2.5s ease-in-out infinite;
  }
  @keyframes glow-line {
    0%,100%{ opacity:0.3; } 50%{ opacity:1; }
  }

  .splash-title {
    font-family:'Amiri', serif;
    font-size: clamp(2.6rem, 8vw, 5rem);
    color: var(--parchment);
    text-align:center;
    letter-spacing:0.04em;
    animation: riseIn 1.2s ease both;
  }
  .splash-title em { color:var(--gold-light); font-style:normal; }

  .splash-sub {
    font-size:0.85rem;
    color:var(--smoke);
    letter-spacing:0.3em;
    animation: riseIn 1.2s ease 0.3s both;
    margin-top:0.4rem;
  }

  #enter-btn {
    margin-top:3rem;
    padding:0.9rem 3.5rem;
    background:transparent;
    border:1px solid rgba(154,122,56,0.6);
    color:var(--gold-light);
    font-family:'Amiri',serif;
    font-size:1.15rem;
    letter-spacing:0.12em;
    cursor:pointer;
    position:relative; overflow:hidden;
    transition: color 0.45s, border-color 0.45s;
    animation: riseIn 1.2s ease 0.6s both;
  }
  #enter-btn::before {
    content:'';
    position:absolute; inset:0;
    background: var(--gold);
    transform:scaleX(0); transform-origin:right;
    transition: transform 0.45s ease;
    z-index:-1;
  }
  #enter-btn:hover { color:var(--deep); border-color:var(--gold); }
  #enter-btn:hover::before { transform:scaleX(1); transform-origin:left; }

  @keyframes riseIn {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  #main { opacity:1; }

  #nav-dots {
    position:fixed; left:1.4rem; top:50%;
    transform:translateY(-50%);
    display:flex; flex-direction:column; gap:16px;
    z-index:500;
  }
  .dot {
    width:7px; height:7px; border-radius:50%;
    border:1px solid rgba(154,122,56,0.5);
    background:transparent; cursor:pointer;
    transition:all 0.35s;
  }
  .dot.active { background:var(--gold); border-color:var(--gold); transform:scale(1.4); }
  @media(max-width:600px){ #nav-dots{display:none;} }

  section {
    min-height:100vh;
    display:flex; flex-direction:column;
    justify-content:center;
    padding: 7rem 2.5rem 7rem;
    position:relative;
  }

  #hero {
    align-items:center; text-align:center;
    background: radial-gradient(ellipse 90% 70% at 50% 45%, #0c1520 0%, #05080d 100%);
    overflow:hidden;
  }
  #hero-rain { position:absolute; inset:0; pointer-events:none; overflow:hidden; }

  .hero-eyebrow {
    font-size:0.72rem; letter-spacing:0.42em;
    color:var(--gold); text-transform:uppercase;
    margin-bottom:1.8rem;
    opacity:0; animation: riseIn 1s ease 0.3s forwards;
  }
  .hero-title {
    font-family:'Amiri',serif;
    font-size: clamp(3.2rem,10vw,7.5rem);
    line-height:1.05;
    color:var(--parchment);
    opacity:0; animation: riseIn 1s ease 0.6s forwards;
  }
  .hero-title .accent { color:var(--gold-light); }
  .hero-rule {
    width:70px; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin:2rem auto;
    opacity:0; animation: riseIn 1s ease 0.9s forwards;
  }
  .hero-desc {
    font-size:1rem; color:var(--smoke);
    line-height:2.1; max-width:440px;
    opacity:0; animation: riseIn 1s ease 1.1s forwards;
  }

  .tear {
    position:absolute;
    width:1px;
    background: linear-gradient(to bottom, transparent, rgba(80,120,180,0.25), transparent);
    border-radius:50%;
    animation: tear-fall var(--d) linear var(--dl) infinite;
    pointer-events:none;
  }
  @keyframes tear-fall {
    0%   { transform:translateY(-60px) scaleY(1); opacity:0; }
    8%   { opacity:1; }
    85%  { opacity:0.4; }
    100% { transform:translateY(105vh) scaleY(1.5); opacity:0; }
  }

  .poem-wrap { max-width:780px; margin:0 auto; width:100%; }

  .poem-tag {
    font-size:0.68rem; letter-spacing:0.45em;
    color:var(--gold); text-transform:uppercase;
    margin-bottom:0.5rem;
  }
  .poem-heading {
    font-family:'Amiri',serif;
    font-size: clamp(2rem,5.5vw,3.4rem);
    color:var(--parchment);
    line-height:1.15; margin-bottom:0.5rem;
  }
  .poem-rule {
    width:50px; height:1px;
    background:var(--gold);
    margin-bottom:2.8rem;
  }

  .stanza {
    margin-bottom:2.2rem;
    opacity:1; transform:translateX(0);
  }
  .stanza.animate {
    opacity:0; transform:translateX(24px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .stanza.animate.vis { opacity:1; transform:translateX(0); }

  .verse {
    font-family:'Amiri',serif;
    font-size: clamp(1.05rem,2.6vw,1.3rem);
    line-height:2.15;
    color:#ccc5b0;
    text-align:right;
    padding-right:1rem;
    border-right:2px solid transparent;
    transition: border-color 0.3s, color 0.3s;
  }
  .verse:hover { border-color:var(--gold); color:var(--gold-light); }
  .verse.highlight { color:var(--gold-light); }

  .sep {
    text-align:center;
    color:var(--smoke);
    font-size:0.85rem;
    letter-spacing:0.5em;
    padding:0.8rem 0;
    opacity:0.5;
  }

  .scene-wrap {
    position:relative;
    height:300px;
    margin-bottom:3.5rem;
    border-radius:2px;
    overflow:hidden;
    border:1px solid rgba(154,122,56,0.12);
  }
  .scene-wrap canvas { width:100%; height:100%; display:block; }
  .scene-overlay {
    position:absolute; inset:0;
    background: linear-gradient(to top, rgba(5,8,13,0.88) 0%, rgba(5,8,13,0.2) 50%, transparent 100%);
    display:flex; align-items:flex-end;
    padding:2rem 2.2rem;
  }
  .scene-quote {
    font-family:'Amiri',serif;
    font-size:1.02rem;
    color: rgba(201,168,76,0.9);
    line-height:2;
    text-align:right;
    max-width:500px;
  }

  #music-bar {
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(5,8,13,0.97);
    border-top:1px solid rgba(154,122,56,0.2);
    padding:0.85rem 2rem;
    display:flex; align-items:center; gap:1.2rem;
    z-index:1000;
    backdrop-filter:blur(16px);
  }
  .m-title { flex:1; font-size:0.82rem; color:var(--smoke); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .m-title strong { color:var(--gold-light); display:block; font-size:0.9rem; }
  #play-btn {
    width:42px; height:42px; border-radius:50%;
    border:1px solid var(--gold);
    background:transparent; color:var(--gold-light);
    font-size:0.95rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.3s; flex-shrink:0;
  }
  #play-btn:hover { background:var(--gold); color:var(--deep); }
  .wave { display:flex; gap:3px; align-items:flex-end; height:20px; opacity:0; transition:opacity 0.4s; }
  .wave.on { opacity:1; }
  .wb { width:3px; background:var(--gold); border-radius:2px; animation:wv var(--s) ease-in-out infinite alternate; }
  @keyframes wv { from{height:3px;} to{height:17px;} }
  .yt-link {
    color:var(--gold); font-size:0.78rem; text-decoration:none;
    padding:0.38rem 0.85rem;
    border:1px solid rgba(154,122,56,0.35);
    border-radius:2px;
    white-space:nowrap;
    transition:background 0.3s;
  }
  .yt-link:hover { background:rgba(154,122,56,0.12); }

  #ending {
    align-items:center; text-align:center;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, #0a1018 0%, #05080d 100%);
  }
  .ending-orn {
    font-family:'Amiri',serif;
    font-size:1.5rem; color:var(--gold);
    letter-spacing:0.3em;
    margin-bottom:1.5rem;
  }
  .ending-txt {
    font-family:'Amiri',serif;
    font-size:clamp(1.15rem,3vw,1.6rem);
    color:var(--parchment);
    line-height:2.2; max-width:480px;
  }
  .ending-txt em { color:var(--gold-light); font-style:normal; }
  .seal {
    width:88px; height:88px;
    border:1px solid rgba(154,122,56,0.5);
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin:2.5rem auto 0;
    font-family:'Amiri',serif; font-size:2rem; color:var(--gold);
    animation: breathe 4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100%{ box-shadow:0 0 0 0 rgba(154,122,56,0); transform:scale(1); }
    50%    { box-shadow:0 0 22px 6px rgba(154,122,56,0.07); transform:scale(1.04); }
  }

  ::-webkit-scrollbar{ width:3px; }
  ::-webkit-scrollbar-track{ background:var(--deep); }
  ::-webkit-scrollbar-thumb{ background:var(--gold); border-radius:2px; }

  @media(max-width:600px){
    section{ padding:5rem 1.5rem; }
    #music-bar{ padding:0.75rem 1.1rem; gap:0.8rem; }
    .scene-wrap{ height:220px; }
  }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-rain" id="splash-rain"></div>
  <div class="splash-photo-wrap">
    <img class="splash-photo" src="...">
  </div>
  <div class="splash-line"></div>
  <h1 class="splash-title">فرحه</h1>
  <p class="splash-sub">بانتظارك</p>
  <button id="enter-btn">دخول</button>
</div>

<div id="main">
  <!-- بقية المحتوى -->
</div>

</body>
</html>
